<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>過労ハムスター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1e1e2e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;gap:28px;
  font-family:'Courier New',monospace;
}
#wrap{
  position:relative;
  width:220px;height:300px;
  flex-shrink:0;
}
#wrap svg{
  position:absolute;top:0;left:0;
  opacity:0;overflow:visible;
}
#wrap svg.show{opacity:1;}
#info{text-align:center}
#tdisp{
  font-size:2rem;font-weight:bold;
  color:rgba(255,255,255,.82);
  letter-spacing:.06em;margin-bottom:8px;
}
#sname{
  font-size:.82rem;letter-spacing:.3em;
  color:rgba(255,255,255,.4);
  margin-bottom:12px;
}
#prog{
  width:200px;height:5px;
  background:rgba(255,255,255,.08);
  border-radius:3px;margin:0 auto;
}
#pbar{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#6ee7b7,#fbbf24,#f87171);
  transition:width .8s;
}
</style>
</head>

// ─── SVG BUILDERS ────────────────────────────────────────
function mkSVG(w, h, inner){
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" overflow="visible">${inner}</svg>`;
}
function stand(eyes, arms, extra=''){
  return mkSVG(200,300, LEGS+BODY+EARS+HEAD+eyes+NOSE_TEETH+arms+extra);
}

const FRAMES=[

  [stand(EYE_OPEN, ARMS_A),          stand(EYE_OPEN, ARMS_B)],
  [stand(EYE_OPEN, ARMS_A, HI_A),    stand(EYE_OPEN, ARMS_B, HI_B)],
  [stand(EYE_HALF, ARMS_A, SW3),     stand(EYE_HALF, ARMS_B, SW3)],
  [stand(EYE_WRECK, ARMS_A, WRECK),  stand(EYE_WRECK, ARMS_B, WRECK)],
  [stand(EYE_X, ARMS_A, ASCEND_A),   stand(EYE_X, ARMS_B, ASCEND_B)],
];
const DIM=[
  {w:220,h:177},
  {w:200,h:300},
  {w:200,h:300},
  {w:200,h:300},
  {w:200,h:300},
  {w:200,h:300},
];

// ─── FRAME TOGGLE ────────────────────────────────────────
let frameTimer = null;
let frameIdx   = 0;

function startFrameToggle(spdSec){
  clearInterval(frameTimer);
  frameIdx = 0;
  const svgs = wrap ? wrap.querySelectorAll('svg') : [];
  if(svgs[0]) svgs[0].classList.add('show');
  if(svgs[1]) svgs[1].classList.remove('show');
  frameTimer = setInterval(()=>{
    frameIdx = 1 - frameIdx;
    const s = wrap.querySelectorAll('svg');
    if(s[0]) s[0].classList.toggle('show', frameIdx===0);
    if(s[1]) s[1].classList.toggle('show', frameIdx===1);
  }, spdSec * 1000 / 2);
}

// ─── STATE ───────────────────────────────────────────────
const savedF  = parseFloat(localStorage.getItem('h_f')||'0');
const savedT  = parseFloat(localStorage.getItem('h_t')||String(Date.now()));
const offSec  = Math.max(0, (Date.now()-savedT)/1000);
let fatigue   = Math.max(0, savedF - offSec*0.5);
// Save immediately so double-recovery doesn't occur on quick refresh
localStorage.setItem('h_f', String(fatigue));
localStorage.setItem('h_t', String(Date.now()));

const sessionStart = Date.now();
let lastTick       = Date.now();
let isVisible      = !document.hidden;
let curStage       = -1;
let saveTick       = 0;

// ─── RENDER ──────────────────────────────────────────────
const wrap  = document.getElementById('wrap');
const tdisp = document.getElementById('tdisp');
const sname = document.getElementById('sname');
const pbar  = document.getElementById('pbar');

function render(si){
  if(si===curStage) return;
  curStage=si;
  const d=DIM[si];
  const [fa,fb]=FRAMES[si];
  wrap.style.width  = d.w+'px';
  wrap.style.height = d.h+'px';
  wrap.innerHTML = fa + fb;
  startFrameToggle(parseFloat(ST[si].spd));
  sname.textContent = ST[si].n;
}

function fmt(s){
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const ss=Math.floor(s%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ─── TICK ────────────────────────────────────────────────
function tick(){
  const now=Date.now();
  const dt=(now-lastTick)/1000;
  lastTick=now;

  const sessionAge=(now-sessionStart)/1000;

  if(isVisible) fatigue=Math.min(MAX_SEC, fatigue+dt);
  else          fatigue=Math.max(0, fatigue-dt*0.5);

  const displayStage = sessionAge<1800 ? 0 : getStage(fatigue);
  render(displayStage);

  tdisp.textContent = fmt(fatigue);
  pbar.style.width  = Math.min(100, fatigue/MAX_SEC*100)+'%';

  saveTick++;
  if(saveTick%10===0){
    localStorage.setItem('h_f', String(fatigue));
    localStorage.setItem('h_t', String(Date.now()));
  }
}

// ─── EVENTS ──────────────────────────────────────────────
document.addEventListener('visibilitychange',()=>{
  isVisible=!document.hidden;
  lastTick=Date.now();
  if(!isVisible){
    localStorage.setItem('h_f', String(fatigue));
    localStorage.setItem('h_t', String(Date.now()));
  }
});

// ─── START ───────────────────────────────────────────────
tick();
setInterval(tick,1000);
</script>
